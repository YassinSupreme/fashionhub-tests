name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Nightly regression run against production at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (local | staging | production)'
        required: false
        default: 'production'
      base_url:
        description: 'Override BASE_URL directly (takes priority over environment)'
        required: false

jobs:
  test:
    name: Playwright — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        env:
          # BASE_URL wins if provided; falls back to TEST_ENV; falls back to default
          BASE_URL: ${{ inputs.base_url || vars.BASE_URL || '' }}
          TEST_ENV: ${{ inputs.environment || vars.TEST_ENV || 'production' }}
          CI: true
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (traces & screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7
